<!DOCTYPE html>
<html lang="en" xlmns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Management</title>
</head>
<body>
<div>
    <h1>Welcome to Movie Management System</h1>
</div>
<div class="stats">
    <div class="stat-box">
        <i class="fas fa-film"></i>
        <h3 th:text="${movieCount ?: '0'}">0</h3>
        <p>Movies</p>
    </div>
    <div class="stat-box">
        <i class="fas fa-star"></i>
        <h3 th:text="${averageRating ?: '0.0'}">0.0</h3>
        <p>Avg Rating</p>
    </div>
</div>
<div>
    <h2>Options</h2>
    <button>View All</button>
    <button>Add New</button>
    <button>Database</button>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.id != null} ? 'Edit Movie' : 'Add New Movie'">Add Movie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .rating-stars {
            color: #ffc107;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-container">
        <div class="form-header">
            <h2 th:text="${movie.id != null} ? 'Edit Movie' : 'Add New Movie'">
                Add New Movie
            </h2>
            <p>Fill in the movie details below</p>
        </div>

        <form th:action="@{/movies/save}" method="post" th:object="${movie}">
            <!-- this populates only if valid -->
            <input type="hidden" th:field="*{id}" />

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="title" class="form-label">Title *</label>
                    <input type="text" id="title" th:field="*{title}"
                           class="form-control" required>
                    <div class="form-text">Movie title</div>
                </div>
                <div class="col-md-6">
                    <label for="director" class="form-label">Director *</label>
                    <input type="text" id="director" th:field="*{director}"
                           class="form-control" required>
                    <div class="form-text">Director's name</div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="genre" class="form-label">Genre *</label>
                    <input type="text" id="genre" th:field="*{genre}"
                           class="form-control" required>
                    <div class="form-text">e.g., Action, Drama, Comedy</div>
                </div>
                <div class="col-md-3">
                    <label for="releaseYear" class="form-label">Release Year *</label>
                    <input type="number" id="releaseYear" th:field="*{releaseYear}"
                           class="form-control" min="1900" max="2030" required>
                </div>
                <div class="mb-3">
                    <label for="durationMinutes" class="form-label required">Duration (minutes)</label>
                    <input type="number" class="form-control" id="durationMinutes"
                           th:field="*{durationMinutes}" required min="1" max="600"
                           placeholder="e.g., 120">
                    <div class="form-text">Required. Must be between 1-600 minutes</div>
                </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" th:field="*{description}"
                          class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-4">
                <label for="rating" class="form-label">Rating (0-10) *</label>
                <div class="d-flex align-items-center">
                    <input type="range" id="rating" th:field="*{rating}"
                           class="form-range" min="0" max="10" step="0.1"
                           oninput="updateRatingValue(this.value)">
                    <span class="rating-stars ms-3" id="ratingValue">
                            <span th:text="${movie.rating != null} ? ${movie.rating} : '5.0'">5.0</span>⭐
                        </span>
                </div>
                <div class="form-text">Drag the slider to set the rating</div>
            </div>

            <div class="action-buttons">
                <button type="submit" class="btn btn-primary">
                        <span th:text="${movie.id != null} ? 'Update Movie' : 'Save Movie'">
                            Save Movie
                        </span>
                </button>
                <a th:href="@{/movies}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    function updateRatingValue(value) {
        document.getElementById('ratingValue').innerHTML = parseFloat(value).toFixed(1) + '⭐';
    }

    document.addEventListener('DOMContentLoaded', function() {
        const ratingInput = document.getElementById('rating');
        if (ratingInput) {
            updateRatingValue(ratingInput.value);
        }
    });
</script>

<!-- Bootstrap from previous course -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
